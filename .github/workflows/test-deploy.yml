name: CI-CD Test

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO: Replace this block with your real build steps
      - name: Build application
        run: |
          echo "Run your real build here"
          mkdir -p backend-app
          echo "Sample app content" > backend-app/index.html

      - name: Create deployment package
        run: |
          cd backend-app
          zip -r ../backend-app.zip .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend-app.zip

  deploy-test:
    name: Deploy to Azure Test
    runs-on: ubuntu-latest
    needs: build
    environment: Test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: .

      - name: List downloaded files (debug)
        run: ls -R

      - name: Deploy to Azure Web App (Test)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_TEST }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TEST }}
          package: backend-app.zip
